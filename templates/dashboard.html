<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .add-job-form {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .add-job-form h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .jobs-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .job-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            transition: transform 0.2s;
        }

        .job-card:hover {
            transform: translateX(5px);
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .job-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .job-company {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .job-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .job-meta span {
            background: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9em;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .status-new { background: #4caf50; color: white; }
        .status-applied { background: #2196f3; color: white; }
        .status-interview { background: #ff9800; color: white; }
        .status-rejected { background: #f44336; color: white; }
        .status-offer { background: #9c27b0; color: white; }

        .job-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .job-actions button {
            padding: 8px 15px;
            font-size: 14px;
        }

        .job-sources {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 30px;
        }

        .source-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .source-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .source-card h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .source-link {
            color: #764ba2;
            text-decoration: none;
            font-size: 0.9em;
            word-break: break-all;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .notification-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Senior Software Engineering Job Tracker</h1>
            <p>Dubai • Netherlands • Germany • Remote</p>

            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Total Jobs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">New</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Applied</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Interviews</div>
                </div>
            </div>
        </header>

        <div class="add-job-form">
            <h2>➕ Add New Job</h2>
            <form id="addJobForm">
                <div class="form-grid">
                    <input type="text" id="company" placeholder="Company Name" required>
                    <input type="text" id="title" placeholder="Job Title" required>
                    <select id="location" required>
                        <option value="">Select Location</option>
                        <option value="Dubai">Dubai</option>
                        <option value="Netherlands">Netherlands</option>
                        <option value="Germany">Germany</option>
                    </select>
                    <input type="text" id="source" placeholder="Source (e.g., LinkedIn)" required>
                </div>
                <input type="url" id="url" placeholder="Job URL" required style="margin-bottom: 15px;">
                <textarea id="notes" placeholder="Notes (optional)" rows="2"></textarea>
                <button type="submit">Add Job</button>
            </form>
        </div>

        <div class="jobs-section">
            <h2>📋 Tracked Jobs</h2>
            <div class="filter-tabs">
                <div class="filter-tab active" data-filter="all">All</div>
                <div class="filter-tab" data-filter="new">New</div>
                <div class="filter-tab" data-filter="applied">Applied</div>
                <div class="filter-tab" data-filter="interview">Interview</div>
                <div class="filter-tab" data-filter="offer">Offer</div>
                <div class="filter-tab" data-filter="rejected">Rejected</div>
            </div>
            <div id="jobsList">
                <div class="empty-state">
                    <h3>No jobs tracked yet</h3>
                    <p>Add your first job above to get started!</p>
                </div>
            </div>
        </div>

        <div class="job-sources">
            <h2>🔗 Job Sources to Monitor</h2>
            <div class="source-grid" id="sourcesGrid"></div>
        </div>
    </div>

    <button class="notification-btn" onclick="testNotification()" title="Test Notification">🔔</button>

    <script>
        // Job sources data
        const jobSources = {
            "Dubai": [
                {"name": "Glassdoor Dubai", "url": "https://www.glassdoor.com/Job/dubai-remote-software-developer-jobs-SRCH_IL.0,5_IC2204498_KO6,31.htm"},
                {"name": "Indeed UAE", "url": "https://ae.indeed.com/q-software-developer-remote-l-dubai-jobs.html"},
                {"name": "NaukriGulf", "url": "https://www.naukrigulf.com/remote-developer-jobs-in-dubai"},
                {"name": "Remote DXB", "url": "https://www.remotedxb.com/"}
            ],
            "Netherlands": [
                {"name": "WeAreDevelopers NL", "url": "https://www.wearedevelopers.com/en/jobs/l/remote/netherlands"},
                {"name": "Indeed Netherlands", "url": "https://www.indeed.com/q-netherlands-developer-l-remote-jobs.html"},
                {"name": "NextLevelJobs NL", "url": "https://nextleveljobs.eu/country/nl"},
                {"name": "Remote Rocketship NL", "url": "https://www.remoterocketship.com/country/netherlands/jobs/senior-software-engineer/"}
            ],
            "Germany": [
                {"name": "LinkedIn Berlin", "url": "https://www.linkedin.com/jobs/senior-java-software-engineer-remote-jobs-berlin-be"},
                {"name": "Glassdoor Berlin", "url": "https://www.glassdoor.com/Job/berlin-remote-developer-jobs-SRCH_IL.0,6_IC2622109_KO7,23.htm"},
                {"name": "NextLevelJobs DE", "url": "https://nextleveljobs.eu/country/de"},
                {"name": "Remote Rocketship DE", "url": "https://www.remoterocketship.com/country/germany/jobs/software-engineer/"}
            ]
        };

        // Load jobs from localStorage
        function loadJobs() {
            const jobs = localStorage.getItem('jobs');
            return jobs ? JSON.parse(jobs) : [];
        }

        // Save jobs to localStorage
        function saveJobs(jobs) {
            localStorage.setItem('jobs', JSON.stringify(jobs));
        }

        // Update statistics
        function updateStats() {
            const jobs = loadJobs();
            const stats = {
                total: jobs.length,
                new: jobs.filter(j => j.status === 'new').length,
                applied: jobs.filter(j => j.status === 'applied').length,
                interview: jobs.filter(j => j.status === 'interview').length
            };

            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.total}</div>
                    <div class="stat-label">Total Jobs</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.new}</div>
                    <div class="stat-label">New</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.applied}</div>
                    <div class="stat-label">Applied</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.interview}</div>
                    <div class="stat-label">Interviews</div>
                </div>
            `;
        }

        // Render jobs
        function renderJobs(filter = 'all') {
            const jobs = loadJobs();
            const filteredJobs = filter === 'all' ? jobs : jobs.filter(j => j.status === filter);
            const jobsList = document.getElementById('jobsList');

            if (filteredJobs.length === 0) {
                jobsList.innerHTML = '<div class="empty-state"><h3>No jobs found</h3></div>';
                return;
            }

            jobsList.innerHTML = filteredJobs.map(job => `
                <div class="job-card">
                    <div class="job-header">
                        <div>
                            <div class="job-company">${job.company}</div>
                            <div class="job-title">${job.title}</div>
                        </div>
                        <span class="status-badge status-${job.status}">${job.status.toUpperCase()}</span>
                    </div>
                    <div class="job-meta">
                        <span>📍 ${job.location}</span>
                        <span>📅 ${new Date(job.date_added).toLocaleDateString()}</span>
                        <span>🔗 ${job.source}</span>
                    </div>
                    ${job.notes ? `<p style="margin: 10px 0; color: #666;">${job.notes}</p>` : ''}
                    <div class="job-actions">
                        <button onclick="openJob('${job.url}')">View Job</button>
                        <button onclick="updateJobStatus(${job.id}, 'applied')">Applied</button>
                        <button onclick="updateJobStatus(${job.id}, 'interview')">Interview</button>
                        <button onclick="updateJobStatus(${job.id}, 'rejected')">Rejected</button>
                        <button onclick="deleteJob(${job.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Render job sources
        function renderSources() {
            const sourcesGrid = document.getElementById('sourcesGrid');
            sourcesGrid.innerHTML = Object.entries(jobSources).map(([location, sources]) => `
                <div class="source-card">
                    <h4>📍 ${location}</h4>
                    ${sources.map(source => `
                        <p><a href="${source.url}" target="_blank" class="source-link">${source.name}</a></p>
                    `).join('')}
                </div>
            `).join('');
        }

        // Add job
        document.getElementById('addJobForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const jobs = loadJobs();
            const newJob = {
                id: Date.now(),
                company: document.getElementById('company').value,
                title: document.getElementById('title').value,
                location: document.getElementById('location').value,
                url: document.getElementById('url').value,
                source: document.getElementById('source').value,
                notes: document.getElementById('notes').value,
                date_added: new Date().toISOString(),
                status: 'new'
            };

            jobs.push(newJob);
            saveJobs(jobs);

            // Show notification
            if (Notification.permission === 'granted') {
                new Notification(`New Job Added: ${newJob.company}`, {
                    body: `${newJob.title} in ${newJob.location}`,
                    icon: '🎯'
                });
            }

            e.target.reset();
            updateStats();
            renderJobs();
        });

        // Update job status
        function updateJobStatus(id, status) {
            const jobs = loadJobs();
            const job = jobs.find(j => j.id === id);
            if (job) {
                job.status = status;
                job.last_updated = new Date().toISOString();
                saveJobs(jobs);
                updateStats();
                renderJobs();
            }
        }

        // Delete job
        function deleteJob(id) {
            if (confirm('Are you sure you want to delete this job?')) {
                const jobs = loadJobs().filter(j => j.id !== id);
                saveJobs(jobs);
                updateStats();
                renderJobs();
            }
        }

        // Open job URL
        function openJob(url) {
            window.open(url, '_blank');
        }

        // Test notification
        function testNotification() {
            if (Notification.permission === 'granted') {
                new Notification('🔔 Job Tracker Test', {
                    body: 'Notifications are working! You\'ll be alerted when you add new jobs.',
                    icon: '🎯'
                });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        testNotification();
                    }
                });
            } else {
                alert('Notifications are blocked. Please enable them in your browser settings.');
            }
        }

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                renderJobs(tab.dataset.filter);
            });
        });

        // Request notification permission on load
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // Initialize
        updateStats();
        renderJobs();
        renderSources();
    </script>
</body>
</html>
