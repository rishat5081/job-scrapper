name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit --strict --desc on 2>&1 || true

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -x ./venv,./tests,./.github -f json -o bandit-report.json || true
          bandit -r src/ -x ./venv,./tests,./.github -ll

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan --all-files --exclude-files 'venv/.*' --exclude-files '\.git/.*' --exclude-files 'data/.*' > .secrets-report.json
          python3 -c "
          import json
          with open('.secrets-report.json') as f:
              report = json.load(f)
          results = report.get('results', {})
          total = sum(len(v) for v in results.values())
          if total > 0:
              print(f'WARNING: {total} potential secret(s) detected')
              for fpath, findings in results.items():
                  for finding in findings:
                      print(f'  {fpath}:{finding.get(\"line_number\", \"?\")}: {finding.get(\"type\", \"unknown\")}')
          else:
              print('No secrets detected.')
          "

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-licenses
        run: |
          pip install -r requirements.txt
          pip install pip-licenses

      - name: Check dependency licenses
        run: |
          pip-licenses --format=plain --with-urls --order=license
          echo ""
          echo "=== Checking for copyleft licenses ==="
          COPYLEFT=$(pip-licenses --format=csv | grep -iE "GPL|AGPL|SSPL|EUPL" || true)
          if [ -n "$COPYLEFT" ]; then
            echo "WARNING: Copyleft license dependencies found:"
            echo "$COPYLEFT"
          else
            echo "No copyleft licenses detected."
          fi
