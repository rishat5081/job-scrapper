name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      PYTHONPATH: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create data directories
        run: |
          mkdir -p data/uploads data/generated_resumes data/reports

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=jobintel --cov-report=term-missing --cov-report=xml --cov-config=pyproject.toml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  import-check:
    name: Import Check
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify all modules import cleanly
        run: |
          python -c "from jobintel.source_registry import list_sources; print('source_registry OK')"
          python -c "from jobintel.job_scraper import scrape_all_jobs; print('job_scraper OK')"
          python -c "from jobintel.resume_pipeline import build_resume_profile; print('resume_pipeline OK')"
          python -c "from jobintel.pdf_utils import write_resume_pdf; print('pdf_utils OK')"
          python -c "from jobintel.api_server import app; print('api_server OK')"
